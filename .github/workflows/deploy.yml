# Auto-deploy slothcv to Cloudflare Pages on every push to master.
#
# Why GitHub Actions and not the Cloudflare Pages "Connect to Git"
# integration? The CF git-connect path requires clicking through the
# dashboard for first-time setup AND it pins each deployment to a
# specific commit hash visible to anyone who finds the .pages.dev
# preview URL. Running wrangler from Actions keeps the deploy
# trigger in this repo (auditable in PRs), uses a scoped CF API
# token (rotatable from one place), and produces clean preview
# URLs without exposing build internals.
#
# Required repo secrets (set via `gh secret set` — already done):
#   - CLOUDFLARE_API_TOKEN          — scoped Pages:Edit token
#   - CLOUDFLARE_ACCOUNT_ID         — slothcv lives in Philip's account
#   - NEXT_PUBLIC_SUPABASE_URL      — public, but needed at build for
#   - NEXT_PUBLIC_SUPABASE_ANON_KEY     the static export to inline
#   - NEXT_PUBLIC_TURNSTILE_SITE_KEY    these into the JS bundle.

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  # Manual trigger from the Actions tab — useful for re-deploying
  # after a config change without needing a code commit.
  workflow_dispatch: {}

# Single in-flight deploy per branch. A second push while one is
# running cancels the older job — we only ever care about the latest
# commit's output, never want two deploys racing on the same project.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      # GITHUB_TOKEN needs deployments:write so the workflow can post
      # the deploy URL back to the commit (Actions tab → "Deployments").
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Bun is the canonical package manager for slothcv (per
      # start_local_server.bat and the bun.lock at repo root). The
      # earlier `actions/setup-node@v4` with `cache: npm` step
      # implicitly required a tracked `package-lock.json`, which
      # contradicted the bun-canonical posture and broke the deploy
      # when package-lock.json got correctly gitignored alongside
      # yarn.lock and pnpm-lock.yaml. Switching to `oven-sh/setup-bun`
      # resolves both: bun is the actual build tool, and
      # `bun install --frozen-lockfile` enforces the same "lockfile
      # and package.json must agree" production-correct discipline
      # that `npm ci` provides.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        # `--frozen-lockfile` fails if bun.lock and package.json
        # disagree — the bun equivalent of `npm ci`.
        run: bun install --frozen-lockfile

      - name: Build static export
        # next build with `output: 'export'` writes the static site to
        # `out/` — that's what wrangler ships to Pages. The three
        # NEXT_PUBLIC_* vars are inlined into the JS bundle at this
        # step, so they MUST be available here, not at deploy time.
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
        run: bun run build

      - name: Deploy to Cloudflare Pages
        # cloudflare/wrangler-action keeps wrangler version-pinned to
        # the workflow rather than whatever's in package.json — means
        # a future wrangler breaking change in this repo's deps can't
        # silently break the deploy pipeline. `--branch master` makes
        # the deploy a Production deployment (not a preview).
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name slothcv --branch master --commit-dirty=true
